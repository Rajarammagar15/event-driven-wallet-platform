server:
  port: 8080

spring:
  application:
    name: wallet-service

  datasource:
    url: jdbc:postgresql://localhost:5433/walletdb?options=-c%20timezone=Asia/Kolkata
    username: postgres
    password: postgres

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer